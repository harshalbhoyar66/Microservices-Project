
# Server Configuration
server.port=8084

# Datasource Configuration
spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.application.name=order-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Circuit Breaker
resilience4j.circuitbreaker.instances.paymentServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.paymentServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.paymentServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentServiceCB.waitDurationInOpenState=10s

# Retry
resilience4j.retry.instances.paymentServiceRetry.maxAttempts=3
resilience4j.retry.instances.paymentServiceRetry.waitDuration=2s

# Product Service Circuit Breaker
resilience4j.circuitbreaker.instances.productServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productServiceCB.waitDurationInOpenState=10s

# TimeLimiter for Product Service
resilience4j.timelimiter.instances.productServiceCB.timeoutDuration=2s

# Bulkhead for Product Service
resilience4j.bulkhead.instances.productServiceBulkhead.maxConcurrentCalls=20
resilience4j.bulkhead.instances.productServiceBulkhead.maxWaitDuration=0
